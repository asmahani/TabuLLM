name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
        langchain_line:
          - label: "1.1"
            langchain: "1.1"
            langchain_core: "1.1"
            langchain_community: "0.4"
          - label: "1.2"
            langchain: "1.2"
            langchain_core: "1.2"
            langchain_community: "0.4"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev dependencies
        run: pip install .[dev]

      - name: Install LangChain compatibility target
        run: >
          pip install
          "langchain==${{ matrix.langchain_line.langchain }}.*"
          "langchain-core==${{ matrix.langchain_line.langchain_core }}.*"
          "langchain-community==${{ matrix.langchain_line.langchain_community }}.*"

      - name: Run tests
        run: pytest tests/ --tb=short --cov=tabullm --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          use_oidc: true
